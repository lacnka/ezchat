<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ezChat v2.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #7c6af7;
    --accent-light: #9d8fff;
    --accent-dim: #2a2550;
    --text: #e8e8f0;
    --muted: #8888a0;
    --danger: #e25252;
    --success: #52c07a;
    --radius: 10px;
    --sidebar: 240px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; font-size: 15px; }

  /* AUTH */
  #auth-screen { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; }
  .auth-logo { font-size: 22px; font-weight: 700; color: var(--accent-light); letter-spacing: -0.5px; margin-bottom: 0.25rem; }
  .auth-sub { color: var(--muted); font-size: 13px; margin-bottom: 2rem; }
  .auth-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; }
  .auth-tab { flex: 1; padding: 8px; text-align: center; border-radius: 7px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all .2s; border: none; background: none; }
  .auth-tab.active { background: var(--accent); color: #fff; font-weight: 500; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: var(--radius); font-size: 14px; outline: none; transition: border .2s; }
  .field input:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .5; cursor: default; }
  .auth-msg { font-size: 13px; text-align: center; margin-top: 1rem; min-height: 20px; }
  .auth-msg.error { color: var(--danger); }
  .auth-msg.success { color: var(--success); }

  /* APP LAYOUT */
  #app { display: none; width: 100%; height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 16px 14px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-logo { font-size: 16px; font-weight: 700; color: var(--accent-light); }
  .sidebar-user { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; display: flex; align-items: center; transition: color .2s; }
  .icon-btn:hover { color: var(--text); }
  .sidebar-section { padding: 14px 14px 6px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; justify-content: space-between; }
  .add-btn { font-size: 18px; color: var(--muted); cursor: pointer; line-height: 1; border: none; background: none; transition: color .2s; }
  .add-btn:hover { color: var(--accent-light); }
  .channels-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .channel-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); transition: all .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .channel-item:hover { background: var(--surface2); color: var(--text); }
  .channel-item.active { background: var(--accent-dim); color: var(--accent-light); font-weight: 500; }
  .channel-hash { font-size: 16px; opacity: .6; flex-shrink: 0; }
  .sidebar-footer { padding: 12px 14px; border-top: 1px solid var(--border); }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; width: 100%; transition: all .2s; }
  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

  /* MAIN CHAT */
  .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chat-channel-name { font-weight: 600; font-size: 15px; }
  .chat-channel-hash { color: var(--accent); font-size: 18px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 2px; }
  .day-divider { text-align: center; margin: 16px 0 12px; }
  .day-divider span { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 3px 12px; border-radius: 20px; }
  .msg { display: flex; gap: 12px; padding: 4px 0; border-radius: 8px; transition: background .1s; }
  .msg:hover { background: var(--surface2); padding-left: 8px; margin-left: -8px; padding-right: 8px; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .msg-body { min-width: 0; }
  .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
  .msg-author { font-size: 13px; font-weight: 600; }
  .msg-time { font-size: 11px; color: var(--muted); }
  .msg-text { font-size: 14px; line-height: 1.55; color: var(--text); word-break: break-word; }
  .msg-continued .msg-avatar { visibility: hidden; }
  .msg-continued .msg-meta { display: none; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 8px; }
  .empty-icon { font-size: 40px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .empty-sub { font-size: 13px; }

  /* INPUT */
  .input-area { padding: 12px 20px 16px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .input-row { display: flex; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; align-items: flex-end; transition: border .2s; }
  .input-row:focus-within { border-color: var(--accent); }
  #msg-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; resize: none; max-height: 120px; line-height: 1.5; font-family: inherit; }
  #msg-input::placeholder { color: var(--muted); }
  .send-btn { background: var(--accent); border: none; color: #fff; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .2s; }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .4; cursor: default; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.75rem; width: 340px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-secondary { flex: 1; padding: 9px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; }
  .btn-primary { flex: 1; padding: 9px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; }

  /* NO CHANNEL */
  .no-channel { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--muted); }
  .no-channel h2 { font-size: 20px; color: var(--text); font-weight: 700; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* SETUP BANNER */
  .setup-banner { background: #1a1030; border: 1px solid var(--accent); border-radius: var(--radius); padding: 12px 14px; margin: 12px 20px 0; font-size: 13px; color: var(--accent-light); display: none; }
  .setup-banner code { background: rgba(124,106,247,.2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">⚡ ezChat v2.0</div>
    <div class="auth-sub">Fast team messaging</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign up</button>
    </div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="you@example.com" /></div>
    <div class="field">
      <label>Password</label>
      <input id="auth-password" type="password" placeholder="••••••••" />
    </div>
    <div id="signup-fields" style="display:none">
      <div class="field"><label>Your name</label><input id="auth-name" type="text" placeholder="How should we call you?" /></div>
    </div>
    <button class="btn" id="auth-btn" onclick="handleAuth()">Sign in</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="setup-banner" id="setup-banner">
    ⚠️ Configure your Supabase keys: open this file, find <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> at the top of the script and replace the placeholders.
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-logo">⚡ ezChat</div>
        <div class="sidebar-user" id="sidebar-user">...</div>
      </div>
    </div>
    <div class="sidebar-section">
      Channels
      <button class="add-btn" onclick="openNewChannel()" title="New channel">+</button>
    </div>
    <div class="channels-list" id="channels-list"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat-area">
    <div class="no-channel" id="no-channel">
      <div style="font-size:40px">💬</div>
      <h2>Welcome to ezChat</h2>
      <p>Select a channel or create one to start chatting.</p>
    </div>

    <div id="channel-view" style="display:none; flex:1; flex-direction:column; min-height:0;">
      <div class="chat-header">
        <span class="chat-channel-hash">#</span>
        <span class="chat-channel-name" id="channel-name-header">general</span>
      </div>
      <div class="chat-messages" id="messages"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="msg-input" rows="1" placeholder="Message #general…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW CHANNEL MODAL -->
<div class="modal-overlay" id="channel-modal">
  <div class="modal">
    <div class="modal-title">Create a channel</div>
    <div class="field">
      <label>Channel name</label>
      <input id="new-channel-name" type="text" placeholder="e.g. design, backend, random" onkeydown="if(event.key==='Enter')createChannel()" />
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="createChannel()">Create</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURATION — replace these with your Supabase project details
// ============================================================
const SUPABASE_URL  = 'https://enxtnlmnvvczxbpnslys.supabase.co/rest/v1/';      // e.g. https://xxxx.supabase.co
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVueHRubG1udnZjenhicG5zbHlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjg3NzQsImV4cCI6MjA5NjkwNDc3NH0.Uo13bHwMZYTjtEnr9D0KtbLekdGw-MxIRHyJ7TsKkJA'; // your anon/public key
// ============================================================

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentChannel = null;
let realtimeSub = null;
let authMode = 'login';
const avatarColors = ['#7c6af7','#52c07a','#e25252','#f0a034','#3db8e8','#e06da8','#4ecdc4'];

// ─── AUTH ────────────────────────────────────────────────────
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (mode==='login'?0:1)===i));
  document.getElementById('signup-fields').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Sign in' : 'Create account';
  setMsg('','');
}

function setMsg(text, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.className = 'auth-msg' + (type ? ' '+type : '');
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-btn');
  if (!email || !password) { setMsg('Please fill in all fields.', 'error'); return; }
  btn.disabled = true;
  setMsg('Please wait…', '');

  if (authMode === 'login') {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { setMsg(error.message, 'error'); btn.disabled = false; return; }
    await initApp(data.user);
  } else {
    const name = document.getElementById('auth-name').value.trim() || email.split('@')[0];
    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) { setMsg(error.message, 'error'); btn.disabled = false; return; }
    if (data.user && !data.user.email_confirmed_at) {
      setMsg('Check your email to confirm your account!', 'success');
    } else {
      await initApp(data.user);
    }
  }
  btn.disabled = false;
}

async function logout() {
  await supabase.auth.signOut();
  currentUser = null; currentChannel = null;
  if (realtimeSub) { supabase.removeChannel(realtimeSub); realtimeSub = null; }
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ─── INIT ────────────────────────────────────────────────────
async function initApp(user) {
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';

  const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
  if (!isConfigured) document.getElementById('setup-banner').style.display = 'block';

  const name = user.user_metadata?.full_name || user.email;
  document.getElementById('sidebar-user').textContent = name;
  await loadChannels();
}

// ─── CHANNELS ────────────────────────────────────────────────
async function loadChannels() {
  const { data, error } = await supabase.from('channels').select('*').order('created_at');
  if (error) { console.error(error); return; }
  renderChannels(data || []);
}

function renderChannels(channels) {
  const list = document.getElementById('channels-list');
  list.innerHTML = '';
  if (!channels.length) {
    list.innerHTML = '<div style="padding:12px 10px;font-size:13px;color:var(--muted)">No channels yet. Create one!</div>';
    return;
  }
  channels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'channel-item' + (currentChannel?.id === ch.id ? ' active' : '');
    el.innerHTML = `<span class="channel-hash">#</span><span>${escHtml(ch.name)}</span>`;
    el.onclick = () => selectChannel(ch);
    list.appendChild(el);
  });
}

function openNewChannel() { document.getElementById('channel-modal').classList.add('open'); document.getElementById('new-channel-name').focus(); }
function closeModal() { document.getElementById('channel-modal').classList.remove('open'); document.getElementById('new-channel-name').value = ''; }

async function createChannel() {
  const name = document.getElementById('new-channel-name').value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  if (!name) return;
  const { data, error } = await supabase.from('channels').insert({ name, created_by: currentUser.id }).select().single();
  if (error) { alert(error.message); return; }
  closeModal();
  await loadChannels();
  selectChannel(data);
}

// ─── MESSAGES ────────────────────────────────────────────────
async function selectChannel(ch) {
  currentChannel = ch;
  document.getElementById('no-channel').style.display = 'none';
  document.getElementById('channel-view').style.display = 'flex';
  document.getElementById('channel-name-header').textContent = ch.name;
  document.getElementById('msg-input').placeholder = `Message #${ch.name}…`;

  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('span:last-child')?.textContent === ch.name);
  });

  await loadMessages(ch.id);
  subscribeToChannel(ch.id);
}

async function loadMessages(channelId) {
  const container = document.getElementById('messages');
  container.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">Loading…</div>';

  const { data, error } = await supabase
    .from('messages')
    .select('*')
    .eq('channel_id', channelId)
    .order('created_at', { ascending: true })
    .limit(200);

  if (error) { container.innerHTML = `<div style="color:var(--danger)">Error: ${error.message}</div>`; return; }
  renderMessages(data || []);
}

function renderMessages(messages) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  if (!messages.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">👋</div><div class="empty-title">Start the conversation</div><div class="empty-sub">Be the first to say something!</div></div>';
    return;
  }

  let lastAuthor = null, lastDate = null;
  messages.forEach((msg, i) => {
    const d = new Date(msg.created_at);
    const dateStr = d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
    if (dateStr !== lastDate) {
      const div = document.createElement('div'); div.className = 'day-divider';
      div.innerHTML = `<span>${dateStr}</span>`; container.appendChild(div);
      lastDate = dateStr; lastAuthor = null;
    }
    const isCont = lastAuthor === msg.user_id && i > 0;
    container.appendChild(buildMsg(msg, isCont));
    lastAuthor = msg.user_id;
  });
  container.scrollTop = container.scrollHeight;
}

function buildMsg(msg, isCont) {
  const el = document.createElement('div');
  el.className = 'msg' + (isCont ? ' msg-continued' : '');
  el.dataset.id = msg.id;
  const name = msg.user_name || 'Unknown';
  const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const color = avatarColors[hashCode(msg.user_id) % avatarColors.length];
  const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  el.innerHTML = `
    <div class="msg-avatar" style="background:${color}22;color:${color}">${initials}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author" style="color:${color}">${escHtml(name)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${escHtml(msg.content)}</div>
    </div>`;
  return el;
}

function appendMessage(msg) {
  const container = document.getElementById('messages');
  const emptyState = container.querySelector('.empty-state');
  if (emptyState) emptyState.remove();

  const msgs = container.querySelectorAll('.msg[data-id]');
  const last = msgs[msgs.length - 1];
  const lastAuthorId = last ? last.querySelector('.msg-author')?.dataset?.uid : null;
  // simpler: just always show full header for realtime messages
  container.appendChild(buildMsg(msg, false));
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !currentChannel) return;
  input.value = ''; input.style.height = 'auto';
  const name = currentUser.user_metadata?.full_name || currentUser.email;
  const { error } = await supabase.from('messages').insert({
    channel_id: currentChannel.id,
    content,
    user_id: currentUser.id,
    user_name: name
  });
  if (error) { alert(error.message); input.value = content; }
}

function subscribeToChannel(channelId) {
  if (realtimeSub) supabase.removeChannel(realtimeSub);
  realtimeSub = supabase.channel(`messages:${channelId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `channel_id=eq.${channelId}` },
      payload => appendMessage(payload.new))
    .subscribe();
}

// ─── UTILS ────────────────────────────────────────────────────
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hashCode(s) { let h=0; for(let i=0;i<s.length;i++) h=Math.imul(31,h)+s.charCodeAt(i)|0; return Math.abs(h); }

// ─── AUTO-LOGIN ───────────────────────────────────────────────
(async () => {
  if (SUPABASE_URL === 'https://enxtnlmnvvczxbpnslys.supabase.co/rest/v1/') return; // demo mode, show auth
  const { data } = await supabase.auth.getSession();
  if (data.session?.user) await initApp(data.session.user);
})();
</script>
</body>
</html>
